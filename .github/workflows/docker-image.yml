name: Docker Image CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Setup Node.js (for Makefile package.json version extraction)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check if version changed
      id: version-check
      run: |
        if git rev-parse HEAD^ >/dev/null 2>&1; then
          PREV_VERSION=$(git show HEAD^:package.json | grep '"version"' | head -n 1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "none")
        else
          PREV_VERSION="none"
        fi
        CURR_VERSION=$(make version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        echo "Previous version: $PREV_VERSION"
        echo "Current version: $CURR_VERSION"
        if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install dependencies (Client)
      run: cd client && npm install

    - name: Run Lint (Client)
      run: cd client && npm run lint

    - name: Run Build (Client)
      run: cd client && npm run build

    - name: Log in to Docker Hub
      if: steps.version-check.outputs.changed == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Publish the Docker image via Makefile
      if: steps.version-check.outputs.changed == 'true'
      run: make publish

